<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DivyangConnectAI — Empowering Ability</title>
    <meta name="description" content="India's first AI-powered inclusion platform built for persons with disabilities." />
    <meta name="author" content="DivyangConnectAI" />

    <meta property="og:title" content="DivyangConnectAI — Empowering Ability" />
    <meta property="og:description" content="AI-powered job matching, government scheme eligibility, and career guidance for PWD." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://DivyangAI.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@DivyangConnectAIPWD" />
    <meta name="twitter:image" content="https://DivyangAI.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <div id="root"></div>

    <!--
      Hidden SVG colour-blind simulation filters.
      Used by the Accessibility Tools page via CSS:
        .a11y-cb-deuteranopia body { filter: url('#a11y-cb-deuteranopia'); }
      Matrices from the W3C Accessibility Guidelines colour-blindness simulation spec.
    -->
    <svg aria-hidden="true" focusable="false"
         style="position:absolute;width:0;height:0;overflow:hidden;pointer-events:none">
      <defs>
        <!-- Deuteranopia — green cone deficiency -->
        <filter id="a11y-cb-deuteranopia" color-interpolation-filters="linearRGB">
          <feColorMatrix type="matrix"
            values="0.367 0.861 -0.228 0 0
                    0.280 0.673  0.047 0 0
                   -0.012 0.043  0.926 0 0
                    0     0      0     1 0"/>
        </filter>
        <!-- Protanopia — red cone deficiency -->
        <filter id="a11y-cb-protanopia" color-interpolation-filters="linearRGB">
          <feColorMatrix type="matrix"
            values="0.152 0.114 -0.003 0 0
                    0.115 0.765  0.120 0 0
                    0.004 0.117  0.879 0 0
                    0     0      0     1 0"/>
        </filter>
        <!-- Tritanopia — blue cone deficiency -->
        <filter id="a11y-cb-tritanopia" color-interpolation-filters="linearRGB">
          <feColorMatrix type="matrix"
            values="0.950 0.050  0     0 0
                    0     0.433  0.567 0 0
                    0     0.475  0.525 0 0
                    0     0      0     1 0"/>
        </filter>
      </defs>
    </svg>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
